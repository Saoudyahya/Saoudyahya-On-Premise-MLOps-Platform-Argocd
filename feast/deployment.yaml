# Feast UI server — browse feature views, entities, and data sources
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feast-ui
  namespace: mlops-feast
  labels:
    app: feast-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feast-ui
  template:
    metadata:
      labels:
        app: feast-ui
    spec:
      containers:
      - name: feast-ui
        image: feastdev/feature-server:0.46.0
        command:
          - feast
          - ui
          - --host=0.0.0.0
          - --port=8888
        env:
        - name: FEAST_REPO_PATH
          value: /feast
        ports:
        - containerPort: 8888
          name: ui
        volumeMounts:
        - name: feast-config
          mountPath: /feast
      volumes:
      - name: feast-config
        configMap:
          name: feast-config
---
# Feast online feature server — serves features to Ray Serve at inference time
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feast-feature-server
  namespace: mlops-feast
  labels:
    app: feast-feature-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feast-feature-server
  template:
    metadata:
      labels:
        app: feast-feature-server
    spec:
      containers:
      - name: feature-server
        image: feastdev/feature-server:0.46.0
        command:
          - feast
          - serve
          - --host=0.0.0.0
          - --port=6566
        env:
        - name: FEAST_REPO_PATH
          value: /feast
        ports:
        - containerPort: 6566
          name: grpc
        volumeMounts:
        - name: feast-config
          mountPath: /feast
      volumes:
      - name: feast-config
        configMap:
          name: feast-config