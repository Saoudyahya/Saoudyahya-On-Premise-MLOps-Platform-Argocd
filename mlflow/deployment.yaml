apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops-mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.11.0
        command:
          - mlflow
          - server
          - --backend-store-uri=$(MLFLOW_BACKEND_STORE_URI)
          - --default-artifact-root=$(MLFLOW_ARTIFACT_ROOT)
          - --host=0.0.0.0
          - --port=5000
          - --workers=2
          - --gunicorn-opts=--timeout 120
        ports:
        - containerPort: 5000
          name: http