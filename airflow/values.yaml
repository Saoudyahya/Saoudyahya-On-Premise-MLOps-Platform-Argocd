images:
  airflow:
    repository: saoudyahya/airflow-dvc
    tag: latest
    pullPolicy: Always
  useDefaultImageForMigration: false
  migrationsWaitTimeout: 120

executor: KubernetesExecutor

webserverSecretKey: "5a887a837794b679764eae82e0c19cffce67a3496b346dba84feb26b41bf392a"

# ── ArgoCD-required fixes ──────────────────────────────────────────────────────
createUserJob:
  useHelmHooks: false
  applyCustomEnv: false

migrateDatabaseJob:
  useHelmHooks: false
  applyCustomEnv: false
  jobAnnotations:
    "argocd.argoproj.io/hook": Sync
# ──────────────────────────────────────────────────────────────────────────────

# ── Probe timeouts (image is slow to start) ───────────────────────────────────
webserver:
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 20
  livenessProbe:
    failureThreshold: 5
    periodSeconds: 10
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 5
    periodSeconds: 10
    timeoutSeconds: 5

scheduler:
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 30

triggerer:
  livenessProbe:
    timeoutSeconds: 30
# ──────────────────────────────────────────────────────────────────────────────

dags:
  gitSync:
    enabled: true
    repo: https://github.com/Saoudyahya/On-Premise-MLOps-Platform-airflow-dags
    branch: main
    subPath: dags/
    wait: 10
    uid: 65533

env:
  - name: MLFLOW_TRACKING_URI
    value: http://mlflow-svc.mlops-mlflow.svc.cluster.local:5000
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "False"
  - name: AWS_ENDPOINT_URL
    value: http://minio-svc.mlops-minio.svc.cluster.local:9000
  - name: AWS_ACCESS_KEY_ID
    value: minio-admin
  - name: AWS_SECRET_ACCESS_KEY
    value: minio-admin
  - name: AIRFLOW__API__AUTH_BACKENDS
    value: airflow.api.auth.backend.basic_auth
  - name: AIRFLOW__API__ENABLE_EXPERIMENTAL_API
    value: "true"
  - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
    value: "true"
  - name: AIRFLOW__KUBERNETES__DELETE_WORKER_PODS
    value: "False"
  - name: AIRFLOW__KUBERNETES__DELETE_WORKER_PODS_ON_FAILURE
    value: "False"
  # ── Remote logging → MinIO ──────────────────────────────────────────────────
  - name: AIRFLOW__LOGGING__REMOTE_LOGGING
    value: "True"
  - name: AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER
    value: "s3://mlops-raw/airflow-logs"
  - name: AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID
    value: "minio_s3"
  - name: AIRFLOW__LOGGING__ENCRYPT_S3_LOGS
    value: "False"
  - name: AIRFLOW__LOGGING__DELETE_LOCAL_LOGS
    value: "False"   # set to "True" only after confirming remote uploads work
  # ──────────────────────────────────────────────────────────────────────────────

secret:
  - envName: AIRFLOW__CORE__FERNET_KEY
    secretName: airflow-fernet-key
    secretKey: fernet-key

# ── MinIO S3 connection for remote logging ─────────────────────────────────────
# Credentials go in login/password — NOT inside extra.
# extra should only carry endpoint_url so Airflow's S3Hook resolves correctly.
connections:
  - id: minio_s3
    type: aws
    login: minio-admin
    password: minio-admin
    extra: |
      {
        "endpoint_url": "http://minio-svc.mlops-minio.svc.cluster.local:9000"
      }
# ──────────────────────────────────────────────────────────────────────────────

postgresql:
  enabled: true
  image:
    tag: "latest"
  auth:
    postgresPassword: postgres

redis:
  enabled: false

workers:
  replicas: 0

ingress:
  web:
    enabled: true
    ingressClassName: nginx
    hosts:
      - name: airflow.yourdomain.com
        tls:
          enabled: false