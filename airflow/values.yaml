images:
  airflow:
    repository: saoudyahya/airflow-dvc
    tag: latest
    pullPolicy: Always
  useDefaultImageForMigration: false
  migrationsWaitTimeout: 120  



   # give it more time
waitForMigrations:
  enabled: false        # ← ADD THIS

executor: KubernetesExecutor

webserverSecretKey: "5a887a837794b679764eae82e0c19cffce67a3496b346dba84feb26b41bf392a"

dags:
  gitSync:
    enabled: true
    repo: https://github.com/Saoudyahya/Saoudyahya-On-Premise-MLOps-Platform-Argocd
    branch: main
    subPath: dags/
    wait: 60
    uid: 65533

env:
  - name: MLFLOW_TRACKING_URI
    value: http://mlflow-svc.mlops-mlflow.svc.cluster.local:5000
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "False"
  - name: AWS_ENDPOINT_URL
    value: http://minio-svc.mlops-minio.svc.cluster.local:9000
  - name: AWS_ACCESS_KEY_ID
    value: minio-admin
  - name: AWS_SECRET_ACCESS_KEY
    value: change-this-password

secret:
  - envName: AIRFLOW__CORE__FERNET_KEY
    secretName: airflow-fernet-key
    secretKey: fernet-key

postgresql:
  enabled: true
  image:
    tag: "latest"
  auth:
    postgresPassword: postgres

redis:
  enabled: false

workers:
  replicas: 0

ingress:
  web:
    enabled: true
    ingressClassName: nginx
    hosts:
      - name: airflow.yourdomain.com
        tls:
          enabled: false


migrateDatabaseJob:
  enabled: true
  jobAnnotations:
    "argocd.argoproj.io/hook": PostSync