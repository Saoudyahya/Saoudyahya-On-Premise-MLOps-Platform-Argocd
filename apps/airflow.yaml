apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://airflow.apache.org
    chart: airflow
    targetRevision: 1.13.1
    helm:
      valueFiles:
        - $values/airflow/values.yaml
  sources:
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: 1.13.1
      helm:
        valueFiles:
          - $values/airflow/values.yaml
    - repoURL: https://github.com/YOUR_ORG/mlops-gitops
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops-airflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true