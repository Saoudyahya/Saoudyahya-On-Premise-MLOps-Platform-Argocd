apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Saoudyahya/Saoudyahya-On-Premise-MLOps-Platform-Argocd/
    targetRevision: main
    path: minio/
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops-minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
```

