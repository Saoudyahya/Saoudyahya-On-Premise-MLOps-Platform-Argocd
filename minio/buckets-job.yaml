apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-buckets
  namespace: mlops-minio
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox
          command: ["sh", "-c", "until nc -z minio-svc 9000; do sleep 2; done"]
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio-svc:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
              mc mb --ignore-existing local/mlops-raw
              mc mb --ignore-existing local/mlops-dvc
              mc mb --ignore-existing local/mlops-mlflow
              echo "Buckets created"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password