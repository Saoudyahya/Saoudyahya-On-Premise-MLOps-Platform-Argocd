hub:
  config:
    JupyterHub:
      authenticator_class: oauthenticator.generic.GenericOAuthenticator
    GenericOAuthenticator:
      client_id: jupyterhub
      client_secret: REPLACE_WITH_SECRET
      authorize_url: https://auth.yourdomain.com/realms/um6p/protocol/openid-connect/auth
      token_url: https://auth.yourdomain.com/realms/um6p/protocol/openid-connect/token
      userdata_url: https://auth.yourdomain.com/realms/um6p/protocol/openid-connect/userinfo
      username_key: preferred_username
      oauth_callback_url: https://jupyter.yourdomain.com/hub/oauth_callback
      scope:
        - openid
        - profile
        - email

  # extraVolumes/extraVolumeMounts are not allowed in singleuser schema
  # so we inject them here via KubeSpawner Python config instead
  extraConfig:
    shared-datasets-volume: |
      def modify_pod_hook(spawner, pod):
          pod.spec.volumes = pod.spec.volumes or []
          pod.spec.volumes.append({
              "name": "shared-datasets",
              "persistentVolumeClaim": {
                  "claimName": "um6p-shared-datasets",
                  "readOnly": True
              }
          })
          for container in pod.spec.containers:
              container.volume_mounts = container.volume_mounts or []
              container.volume_mounts.append({
                  "name": "shared-datasets",
                  "mount_path": "/data",
                  "read_only": True
              })
          return pod
      c.KubeSpawner.modify_pod_hook = modify_pod_hook

singleuser:
  image:
    name: saoudyahya/jupyter-researcher
    tag: latest
    pullPolicy: Always

  profileList:
    - display_name: "CPU — 4 cores, 16GB RAM"
      default: true
      kubespawner_override:
        cpu_limit: 4
        mem_limit: "16G"

    - display_name: "1x GPU — A100, 32GB RAM"
      kubespawner_override:
        cpu_limit: 8
        mem_limit: "32G"
        extra_resource_limits:
          nvidia.com/gpu: "1"

    - display_name: "2x GPU — A100, 64GB RAM"
      kubespawner_override:
        cpu_limit: 16
        mem_limit: "64G"
        extra_resource_limits:
          nvidia.com/gpu: "2"

  storage:
    dynamic:
      storageClass: rook-ceph-block
    capacity: 50Gi
    homeMountPath: /home/jovyan

  # These ARE allowed under singleuser — only extraVolumes/Mounts were rejected
  extraEnv:
    MLFLOW_TRACKING_URI: http://mlflow-svc.mlops-mlflow.svc.cluster.local:5000
    AWS_ENDPOINT_URL: http://rook-ceph-rgw.rook-ceph.svc.cluster.local:80
    DVC_REMOTE_URL: s3://um6p-dvc-central

cull:
  enabled: true
  timeout: 3600
  every: 300
  maxAge: 28800

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - jupyter.yourdomain.com
  tls: []