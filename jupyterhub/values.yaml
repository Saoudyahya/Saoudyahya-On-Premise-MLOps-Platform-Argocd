hub:
  config:
    JupyterHub:
      authenticator_class: dummy

  services:
    airflow:
      apiToken: "4f3c2a1b8e7d6f5a4b3c2d1e0f9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d3e2f1a"
      admin: true

  # FIX: Disable the built-in NetworkPolicies so Airflow (in mlops-airflow
  # namespace) can reach the hub API on port 8081.
  # Alternatively, keep networkPolicy.enabled=true and apply the
  # allow-airflow-to-hub-netpol.yaml manifest instead.
  networkPolicy:
    enabled: false

singleuser:
  image:
    name: saoudyahya/jupyter-researcher
    tag: latest
    pullPolicy: Always

  storage:
    dynamic:
      storageClass: standard
    capacity: 1Gi
    homeMountPath: /home/jovyan

  extraEnv:
    MLFLOW_TRACKING_URI: http://mlflow-svc.mlops-mlflow.svc.cluster.local:5000
    AWS_ENDPOINT_URL: http://minio-svc.mlops-minio.svc.cluster.local:9000
    DVC_REMOTE_URL: s3://um6p-dvc-central

  # FIX: also disable NetworkPolicy for singleuser pods
  networkPolicy:
    enabled: false

cull:
  enabled: true
  timeout: 3600
  every: 300
  maxAge: 28800

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - jupyter.yourdomain.com
  tls: []