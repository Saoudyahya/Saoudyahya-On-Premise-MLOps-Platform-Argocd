hub:
  config:
    JupyterHub:
      authenticator_class: dummy


singleuser:
  image:
    name: saoudyahya/jupyter-researcher
    tag: latest
    pullPolicy: Always

  storage:
    dynamic:
      storageClass: standard   # ← rook-ceph-block replaced for testing
    capacity: 1Gi
    homeMountPath: /home/jovyan

  extraEnv:
    MLFLOW_TRACKING_URI: http://mlflow-svc.mlops-mlflow.svc.cluster.local:5000
    AWS_ENDPOINT_URL: http://minio-svc.mlops-minio.svc.cluster.local:9000
    DVC_REMOTE_URL: s3://um6p-dvc-central

cull:
  enabled: true
  timeout: 3600
  every: 300
  maxAge: 28800

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - jupyter.yourdomain.com
  tls: []