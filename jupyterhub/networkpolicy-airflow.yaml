---
# Allow Airflow worker pods (mlops-airflow namespace) to reach the JupyterHub
# hub service on port 8081.
# The z2jh Helm chart deploys a default-deny NetworkPolicy that blocks all
# ingress traffic to the hub pod from outside its own namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-airflow-to-hub
  namespace: mlops-jupyterhub
spec:
  podSelector:
    matchLabels:
      component: hub          # selects the JupyterHub hub pod
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mlops-airflow
      ports:
        - protocol: TCP
          port: 8081